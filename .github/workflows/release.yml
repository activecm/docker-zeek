name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY_IMAGE: activecm/zeek

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build-binary:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goarch: amd64
            name: amd64
          - goarch: arm64
            name: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          source build.env
          version="${GITHUB_REF_NAME}"
          go build \
            -ldflags="-X main.Version=${version} -X main.DefaultRelease=${ZEEK_VERSION}" \
            -o zeek .

      - name: Package
        run: |
          tar -czf "zeek-linux-${{ matrix.name }}.tar.gz" zeek

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zeek-linux-${{ matrix.name }}
          path: zeek-linux-${{ matrix.name }}.tar.gz

  build-docker:
    needs: ci
    runs-on: "${{ matrix.runner }}"
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            name: amd64
            runner: ubuntu-large-1
          - platform: linux/arm64
            arch: arm64
            name: arm64
            runner: ubuntu-arm-l
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load versions
        run: |
          source build.env
          echo "ZEEK_VERSION=${ZEEK_VERSION}" >> $GITHUB_ENV
          echo "ALPINE_VERSION=${ALPINE_VERSION}" >> $GITHUB_ENV

      - name: Prepare
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ env.ZEEK_VERSION }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: ${{ !contains(github.ref_name, '-') }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # stable releases: build and push to Docker Hub by digest
      - name: Build and push by digest
        if: ${{ !contains(github.ref_name, '-') }}
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            ZEEK_VERSION=${{ env.ZEEK_VERSION }}
          push: true
          no-cache-filters: final

      - name: Export digest
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build-push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ !contains(github.ref_name, '-') }}
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      # rc releases: build locally only (no Docker Hub push)
      - name: Build image locally
        if: ${{ contains(github.ref_name, '-') }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            ZEEK_VERSION=${{ env.ZEEK_VERSION }}
          load: true
          tags: ${{ env.REGISTRY_IMAGE }}:${{ env.ZEEK_VERSION }}
          no-cache-filters: final

      # all releases: save image for offline use
      - name: Save Docker image for offline use (stable)
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          docker pull --platform ${{ matrix.platform }} ${{ env.REGISTRY_IMAGE }}@${{ steps.build-push.outputs.digest }}
          docker tag ${{ env.REGISTRY_IMAGE }}@${{ steps.build-push.outputs.digest }} ${{ env.REGISTRY_IMAGE }}:${{ env.ZEEK_VERSION }}
          docker save ${{ env.REGISTRY_IMAGE }}:${{ env.ZEEK_VERSION }} | gzip > "zeek-image-offline-${{ matrix.name }}.tar.gz"

      - name: Save Docker image for offline use (rc)
        if: ${{ contains(github.ref_name, '-') }}
        run: |
          docker save ${{ env.REGISTRY_IMAGE }}:${{ env.ZEEK_VERSION }} | gzip > "zeek-image-offline-${{ matrix.name }}.tar.gz"

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: zeek-image-offline-${{ matrix.name }}
          path: zeek-image-offline-${{ matrix.name }}.tar.gz

  merge-docker:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on:
      group: "ubuntu-runners-l"
    needs: build-docker
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load versions
        run: |
          source build.env
          echo "ZEEK_VERSION=${ZEEK_VERSION}" >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ env.ZEEK_VERSION }}
            type=raw,value=latest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ env.ZEEK_VERSION }}

  release:
    needs:
      - build-binary
      - build-docker
      - merge-docker
    if: ${{ !failure() && !cancelled() && needs.build-binary.result == 'success' && needs.build-docker.result == 'success' && (needs.merge-docker.result == 'success' || needs.merge-docker.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          pattern: zeek-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: ./artifacts
        run: |
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            **CLI binary** (requires internet to pull the Docker image):
            - `zeek-linux-amd64.tar.gz` (x86_64)
            - `zeek-linux-arm64.tar.gz` (ARM64)

            **Docker image (offline installs only)** - load with `docker load -i <file>` before running the CLI:
            - `zeek-image-offline-amd64.tar.gz`
            - `zeek-image-offline-arm64.tar.gz`
          files: ./artifacts/*
